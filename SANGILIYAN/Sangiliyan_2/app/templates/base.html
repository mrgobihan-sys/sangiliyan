<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sangiliyan | Archives & Patrimoine</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
        }
        /* Navbar noire style Bootstrap */
        .bg-dark-custom {
            background-color: #1a1a1a !important;
        }
        .nav-link {
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-weight: 600;
        }
        /* Pour que le contenu ne soit pas collé au footer */
        main {
            min-height: 85vh;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-custom py-3 shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="/">SANGILIYAN</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link px-3" href="/">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'timeline' %}">Chronologie</a></li>
                    <li class="nav-item ms-lg-3">
                        <a class="nav-link border border-secondary rounded px-3" href="/admin">Connexion Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="py-4 bg-white border-top mt-5 text-center">
        <p class="text-muted small mb-0">&copy; 2026 SANGILIYAN - Préservation du Patrimoine</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
